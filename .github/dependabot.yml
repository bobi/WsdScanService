version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "System.ServiceModel.*"
        update-types: [ "version-update:semver-major" ]
  - package-ecosystem: "docker"
    directory: "/docker"
    target-branch: "dev"
    schedule:
      interval: "weekly"
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
